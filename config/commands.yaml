# ─────────────────────────────────────────────────────────────────────────────
# VoxCtrl — Command Registry
# ─────────────────────────────────────────────────────────────────────────────
#
# Structure of each entry:
#   name:    canonical command name (used in logs and session DB)
#   aliases: alternate phrases that map to the same command (fuzzy matched)
#   exec:    shell command to run (runs via bash -c "...")
#
# Hot-reload: edit this file while the daemon is running — changes take
# effect within 2 seconds. No restart needed.
# ─────────────────────────────────────────────────────────────────────────────


# ═════════════════════════════════════════════════════════════════════════════
# SYSTEM CONTROLS
# ═════════════════════════════════════════════════════════════════════════════

- name: lock screen
  aliases:
    - lock the screen
    - screen lock
    - lock my screen
    - lock computer
  exec: "loginctl lock-session"

- name: volume up
  aliases:
    - turn up volume
    - increase volume
    - louder
    - sound up
  exec: "pactl set-sink-volume @DEFAULT_SINK@ +10%"

- name: volume down
  aliases:
    - turn down volume
    - decrease volume
    - quieter
    - sound down
    - lower volume
  exec: "pactl set-sink-volume @DEFAULT_SINK@ -10%"

- name: mute
  aliases:
    - toggle mute
    - mute audio
    - silence
    - unmute
  exec: "pactl set-sink-mute @DEFAULT_SINK@ toggle"

- name: take screenshot
  aliases:
    - screenshot
    - capture screen
    - grab screenshot
    - snap screen
  exec: "gnome-screenshot &"

- name: screenshot area
  aliases:
    - capture area
    - screenshot selection
    - select screenshot
    - grab area
  exec: "gnome-screenshot -a &"

- name: empty trash
  aliases:
    - clear trash
    - delete trash
    - empty bin
  exec: "gio trash --empty"

- name: system monitor
  aliases:
    - open system monitor
    - task manager
    - show processes
    - process monitor
  exec: "gnome-system-monitor &"


# ═════════════════════════════════════════════════════════════════════════════
# APP LAUNCHERS
# ═════════════════════════════════════════════════════════════════════════════

- name: open terminal
  aliases:
    - new terminal
    - launch terminal
    - open console
    - start terminal
    - terminal please
  exec: "gnome-terminal &"

- name: open browser
  aliases:
    - launch browser
    - open firefox
    - start browser
    - open internet
    - launch firefox
  exec: "firefox &"

- name: open files
  aliases:
    - open file manager
    - launch nautilus
    - open folder
    - file explorer
    - open nautilus
  exec: "nautilus &"


# ═════════════════════════════════════════════════════════════════════════════
# NETWORK & SYSTEM INFO
# ═════════════════════════════════════════════════════════════════════════════

- name: show ip
  aliases:
    - what is my ip
    - my ip address
    - show ip address
    - check ip
    - local ip
  exec: "hostname -I | awk '{print $1}'"

- name: show disk usage
  aliases:
    - disk space
    - how much disk
    - disk usage
    - storage usage
    - check disk
  exec: "df -h / | tail -1 | awk '{print \"Used: \" $3 \" / \" $2 \" (\" $5 \")\"}'"

- name: show memory
  aliases:
    - memory usage
    - how much ram
    - ram usage
    - check memory
    - free memory
  exec: "free -h | awk '/^Mem:/ {print \"Used: \" $3 \" / \" $2}'"

- name: show uptime
  aliases:
    - system uptime
    - how long running
    - uptime
    - check uptime
  exec: "uptime -p"

- name: check ports
  aliases:
    - show open ports
    - listening ports
    - open ports
    - network ports
  exec: "ss -tlnp | awk 'NR>1 {print $4}' | head -10"


# ═════════════════════════════════════════════════════════════════════════════
# CLIPBOARD & PRODUCTIVITY
# ═════════════════════════════════════════════════════════════════════════════

- name: clear clipboard
  aliases:
    - empty clipboard
    - wipe clipboard
    - reset clipboard
  exec: "echo -n '' | xclip -selection clipboard"

- name: open calendar
  aliases:
    - show calendar
    - launch calendar
    - open gnome calendar
  exec: "gnome-calendar &"

- name: open calculator
  aliases:
    - launch calculator
    - show calculator
    - open calc
  exec: "gnome-calculator &"


# ═════════════════════════════════════════════════════════════════════════════
# SPOTIFY / MEDIA
# ═════════════════════════════════════════════════════════════════════════════

- name: open spotify
  aliases:
    - launch spotify
    - start spotify
    - play music
    - open music
  exec: "spotify"

- name: pause music
  aliases:
    - pause
    - pause song
    - stop music
    - pause spotify
  exec: "playerctl pause"

- name: play music
  aliases:
    - resume
    - play
    - resume music
    - play song
  exec: "playerctl play"

- name: next song
  aliases:
    - next track
    - skip
    - skip song
    - next music
  exec: "playerctl next"

- name: previous song
  aliases:
    - previous track
    - go back
    - last song
    - prev track
  exec: "playerctl previous"

- name: now playing
  aliases:
    - what song
    - current song
    - what is playing
    - song info
  exec: "playerctl metadata --format '{{artist}} — {{title}}'"


# ═════════════════════════════════════════════════════════════════════════════
# VOXCTRL SELF-MANAGEMENT
# ═════════════════════════════════════════════════════════════════════════════

- name: reload commands
  aliases:
    - refresh commands
    - reload config
    - update commands
    - refresh config
  exec: "pkill -SIGHUP voxctrl"

- name: voxctrl status
  aliases:
    - daemon status
    - is voxctrl running
    - voice status
    - check daemon
  exec: "systemctl --user is-active voxctrl"

- name: show session log
  aliases:
    - voice history
    - command history
    - session history
    - what did i say
    - recent commands
  exec: "sqlite3 ~/.local/share/voxctrl/sessions.db 'SELECT intent FROM sessions ORDER BY id DESC LIMIT 8'"
