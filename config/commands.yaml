# ═════════════════════════════════════════════════════════════════════════════
# NETWORK & SYSTEM INFO
# ═════════════════════════════════════════════════════════════════════════════

- name: show ip
  aliases:
    - what is my ip
    - my ip address
    - show ip address
    - check ip
    - local ip
  exec: "notify-send 'IP Address' \"$(hostname -I | awk '{print $1}')\""

- name: show disk usage
  aliases:
    - disk space
    - how much disk
    - disk usage
    - storage usage
    - check disk
  exec: "notify-send 'Disk Usage' \"$(df -h / | tail -1 | awk '{print \"Used: \" $3 \" / \" $2 \" (\" $5 \")\"}')\""

- name: show memory
  aliases:
    - memory usage
    - how much ram
    - ram usage
    - check memory
    - free memory
  exec: "notify-send 'Memory' \"$(free -h | awk '/^Mem:/ {print \"Used: \" $3 \" / \" $2}')\""

- name: show uptime
  aliases:
    - system uptime
    - how long running
    - uptime
    - check uptime
  exec: "notify-send 'Uptime' \"$(uptime -p)\""

- name: check ports
  aliases:
    - show open ports
    - listening ports
    - open ports
    - network ports
  exec: "notify-send 'Open Ports' \"$(ss -tlnp | awk 'NR>1 {print $4}' | head -10)\""


