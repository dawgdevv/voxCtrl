# ═════════════════════════════════════════════════════════════════════════════
# SYSTEM CONTROLS
# ═════════════════════════════════════════════════════════════════════════════

- name: lock screen
  aliases:
    - lock the screen
    - screen lock
    - lock my screen
    - lock computer
  exec: "loginctl lock-session"

- name: volume up
  aliases:
    - turn up volume
    - increase volume
    - louder
    - sound up
  exec: "pactl set-sink-volume @DEFAULT_SINK@ +10%"

- name: volume down
  aliases:
    - turn down volume
    - decrease volume
    - quieter
    - sound down
    - lower volume
  exec: "pactl set-sink-volume @DEFAULT_SINK@ -10%"

- name: mute
  aliases:
    - toggle mute
    - mute audio
    - silence
    - unmute
  exec: "pactl set-sink-mute @DEFAULT_SINK@ toggle"

- name: take screenshot
  aliases:
    - screenshot
    - capture screen
    - grab screenshot
    - snap screen
  exec: "gnome-screenshot"

- name: screenshot area
  aliases:
    - capture area
    - screenshot selection
    - select screenshot
    - grab area
  exec: "gnome-screenshot -a"

- name: empty trash
  aliases:
    - clear trash
    - delete trash
    - empty bin
  exec: "gio trash --empty"

- name: system monitor
  aliases:
    - open system monitor
    - task manager
    - show processes
    - process monitor
  exec: "gnome-system-monitor"


# ═════════════════════════════════════════════════════════════════════════════
# GIT
# ═════════════════════════════════════════════════════════════════════════════

- name: git status
  aliases:
    - show git status
    - what is the git status
    - git state
    - check git
    - whats changed
  exec: "notify-send 'Git Status' \"$(git status --short 2>&1 || echo 'Not a git repo')\""

- name: git pull
  aliases:
    - pull latest
    - git pull origin
    - pull changes
    - fetch latest
    - update repo
  exec: "git pull && notify-send 'Git' 'Pull complete'"

- name: git push
  aliases:
    - push changes
    - git push origin
    - push code
    - push commits
  exec: "git push && notify-send 'Git' 'Push complete'"

- name: what branch
  aliases:
    - current branch
    - which branch
    - show branch
    - git branch
  exec: "notify-send 'Git Branch' \"$(git branch --show-current 2>&1 || echo 'Not a git repo')\""

- name: git log
  aliases:
    - show git log
    - recent commits
    - git history
    - last commits
  exec: "notify-send 'Git Log' \"$(git log --oneline -8 2>&1 || echo 'Not a git repo')\""

- name: git stash
  aliases:
    - stash changes
    - save stash
    - git stash save
  exec: "git stash && notify-send 'Git' 'Changes stashed'"

- name: git stash pop
  aliases:
    - pop stash
    - restore stash
    - unstash
    - apply stash
  exec: "git stash pop && notify-send 'Git' 'Stash applied'"

- name: git diff
  aliases:
    - show diff
    - what changed
    - show changes
    - git changes
  exec: "notify-send 'Git Diff' \"$(git diff --stat 2>&1 || echo 'Not a git repo')\""


# ═════════════════════════════════════════════════════════════════════════════
# DOCKER
# ═════════════════════════════════════════════════════════════════════════════

- name: docker up
  aliases:
    - start docker
    - docker compose up
    - bring docker up
    - start containers
    - compose up
  exec: "docker-compose up -d && notify-send 'Docker' 'Containers started'"

- name: docker down
  aliases:
    - stop docker
    - docker compose down
    - bring docker down
    - stop containers
    - compose down
  exec: "docker-compose down && notify-send 'Docker' 'Containers stopped'"

- name: docker status
  aliases:
    - show containers
    - list containers
    - docker ps
    - running containers
    - what containers
  exec: "notify-send 'Docker Containers' \"$(docker ps --format '{{.Names}} — {{.Status}}' 2>&1)\""

- name: docker logs
  aliases:
    - show docker logs
    - container logs
    - docker compose logs
    - tail logs
  exec: "gnome-terminal -- bash -c 'docker-compose logs --tail=50 -f; read'"

- name: docker restart
  aliases:
    - restart containers
    - restart docker
    - bounce docker
  exec: "docker-compose restart && notify-send 'Docker' 'Containers restarted'"

- name: docker build
  aliases:
    - build docker
    - docker compose build
    - rebuild containers
    - build image
  exec: "gnome-terminal -- bash -c 'docker-compose build; read'"

- name: docker prune
  aliases:
    - clean docker
    - prune docker
    - remove unused containers
    - docker cleanup
  exec: "docker system prune -f && notify-send 'Docker' 'System pruned'"


