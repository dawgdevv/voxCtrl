# ─────────────────────────────────────────────────────────────────────────────
# VoxCtrl — Command Registry v1.0
# ─────────────────────────────────────────────────────────────────────────────
#
# Structure of each entry:
#   name:    canonical command name (used in logs and session DB)
#   aliases: alternate phrases that map to the same command (fuzzy matched)
#   exec:    shell command to run (runs via bash -c "...")
#
# Hot-reload: edit this file while the daemon is running — changes take
# effect within 2 seconds. No restart needed.
#
# Tips:
#   - aliases are fuzzy matched, so minor speech variations work automatically
#   - exec runs in your home directory by default
#   - use $(xdotool getactivewindow ...) for window-aware commands
#   - notify-send displays output as a desktop notification
# ─────────────────────────────────────────────────────────────────────────────


