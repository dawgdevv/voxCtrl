# ═════════════════════════════════════════════════════════════════════════════
# VOXCTRL SELF-MANAGEMENT
# ═════════════════════════════════════════════════════════════════════════════

- name: reload commands
  aliases:
    - refresh commands
    - reload config
    - update commands
    - refresh config
  exec: "pkill -SIGHUP voxctrl && notify-send 'VoxCtrl' 'Commands reloaded'"

- name: voxctrl status
  aliases:
    - daemon status
    - is voxctrl running
    - voice status
    - check daemon
  exec: "notify-send 'VoxCtrl' \"$(systemctl --user is-active voxctrl)\""

- name: show session log
  aliases:
    - voice history
    - command history
    - session history
    - what did i say
    - recent commands
  exec: "notify-send 'Recent Commands' \"$(sqlite3 ~/.local/share/voxctrl/sessions.db 'SELECT intent FROM sessions ORDER BY id DESC LIMIT 8' 2>&1)\""